services:
  neo4j:
    image: neo4j:latest
    container_name: unicurriculum-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/your_password_here
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
